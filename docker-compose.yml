version: '3.8'

services:
  # ==================== 应用服务 ====================
  app:
    # 使用 DockerHub 镜像（推荐，快速部署）
    image: kokojacket/panbox-search:latest

    # 如果需要本地构建，注释掉上面的 image，取消注释下面的 build
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: panbox-search-app

    # 端口映射 - 可以通过 .env 文件修改，或使用默认值 80
    ports:
      - "${APP_PORT:-80}:80"

    # 环境变量配置（使用固定值，自动安装）
    environment:
      # 数据库连接（固定配置）
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=panbox-search
      - DB_USER=panbox-search
      - DB_PASSWORD=panbox-search
      - DB_PREFIX=qf_

      # 应用配置（固定配置）
      - APP_DEBUG=false
      - APP_TIMEZONE=Asia/Shanghai
      - SYSTEM_SALT=Panbox Search

      # 网站名称（可在后台修改）
      - SITE_NAME=Panbox Search

      # 缓存配置（Docker 默认使用 Redis；可通过 .env 设置 CACHE_DRIVER=file 回退）
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_SELECT=${REDIS_SELECT:-0}
      - REDIS_PREFIX=${REDIS_PREFIX:-panbox:}
      # 内部接口鉴权
      - PANBOX_INTERNAL_TOKEN=${PANBOX_INTERNAL_TOKEN:-change-me}
      - OPENILINK_MONITOR_ENABLED=false

      # Apache Worker 配置
      - APACHE_SERVER_LIMIT=${APACHE_SERVER_LIMIT:-32}
      - APACHE_MAX_REQUEST_WORKERS=${APACHE_MAX_REQUEST_WORKERS:-32}
      - APACHE_START_SERVERS=${APACHE_START_SERVERS:-4}
      - APACHE_MIN_SPARE_SERVERS=${APACHE_MIN_SPARE_SERVERS:-4}
      - APACHE_MAX_SPARE_SERVERS=${APACHE_MAX_SPARE_SERVERS:-8}

    # 数据持久化
    volumes:
      # 运行时目录（缓存、日志等）
      - /opt/panbox-search/app/runtime:/var/www/html/runtime
      # License 设备标识持久化目录
      - /opt/panbox-search/app/data:/var/www/html/data
      # 上传文件目录
      - /opt/panbox-search/app/uploads:/var/www/html/public/uploads
      # 安装目录（保存安装锁文件）
      - /opt/panbox-search/app/install:/var/www/html/public/install

    # 依赖服务
    depends_on:
      - mysql
      - redis

    # 网络配置
    networks:
      - panbox-search-network

    # 重启策略
    restart: unless-stopped

  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:5.7
    container_name: panbox-search-mysql

    # 端口映射（如果不需要外部访问可以注释掉）
    # ports:
    #   - "3306:3306"

    # 环境变量（固定配置）
    environment:
      - MYSQL_ROOT_PASSWORD=panbox-search
      - MYSQL_DATABASE=panbox-search
      - MYSQL_USER=panbox-search
      - MYSQL_PASSWORD=panbox-search
      - TZ=Asia/Shanghai

    # 数据持久化
    volumes:
      # MySQL 数据目录
      - /opt/panbox-search/mysql:/var/lib/mysql

    # 网络配置
    networks:
      - panbox-search-network

    # 重启策略
    restart: unless-stopped

    # 性能优化
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=1000
      - --max_allowed_packet=128M

  # ==================== OpenIlink 独立轮询服务 ====================
  openilink-poller:
    image: kokojacket/panbox-openilink-poller:latest
    container_name: panbox-openilink-poller
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=panbox-search
      - MYSQL_USER=panbox-search
      - MYSQL_PASSWORD=panbox-search
      - MYSQL_PREFIX=qf_
      - PANBOX_INTERNAL_BASE_URL=http://app
      - PANBOX_INTERNAL_TOKEN=${PANBOX_INTERNAL_TOKEN:-change-me}
      - OPENILINK_MAX_CONCURRENCY=${OPENILINK_MAX_CONCURRENCY:-300}
      - OPENILINK_CLAIM_LIMIT=${OPENILINK_CLAIM_LIMIT:-300}
      - OPENILINK_LEASE_TTL=${OPENILINK_LEASE_TTL:-45}
      - OPENILINK_POLL_TIMEOUT_MS=${OPENILINK_POLL_TIMEOUT_MS:-30000}
      - OPENILINK_IDLE_SLEEP=${OPENILINK_IDLE_SLEEP:-3}
      - OPENILINK_HTTP_TIMEOUT=${OPENILINK_HTTP_TIMEOUT:-45}
      - OPENILINK_BACKEND_TIMEOUT=${OPENILINK_BACKEND_TIMEOUT:-120}
    depends_on:
      - app
      - mysql
    networks:
      - panbox-search-network
    restart: unless-stopped

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: panbox-search-redis

    # 默认不暴露端口，仅供内部网络访问
    command: >
      sh -c "if [ -n \"$${REDIS_PASSWORD}\" ]; then
      redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\";
      else
      redis-server --appendonly yes;
      fi"

    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}

    # Redis 数据持久化
    volumes:
      - /opt/panbox-search/redis:/data

    # 网络配置
    networks:
      - panbox-search-network

    # 重启策略
    restart: unless-stopped

# ==================== 网络配置 ====================
networks:
  panbox-search-network:
    driver: bridge

